requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"


name = "aerbp"
version = "0.1.0"
description = "AI Equity Research and Backtesting Platform"
requires-python = ">=3.11"
dependencies = [
    "duckdb>=0.10",
    "pandas>=2.2",
    "numpy>=1.26",
    "pyarrow>=15",
    "scikit-learn>=1.4",
    "matplotlib>=3.8",
    "yfinance>=.2",
    "pytest>=8.0"
]

aerbp-info = "aerbp.cli:main"

where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"